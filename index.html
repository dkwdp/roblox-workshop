<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="sketch-holder"></div>

<script type="module">
    import {initScenes} from "dkwdpil";
    import {StartScene} from "./src/start-scene";
    import {SetupWinAppleScene} from "./src/setup-win-apple.ts";
    import {SetupLinux} from "./src/setup-linux.ts";
    import {GettingStarted} from "./src/getting-started.ts";
    import {Camera} from "./src/camera.ts";
    import {PlacePart} from "./src/place-part.ts";
    import {RunGame} from "./src/run-game.ts";
    import {Movement} from "./src/movement.ts";
    import {Anker} from "./src/anker.ts";
    import {Tasks1} from "./src/tasks1.ts";
    import {Tasks2} from "./src/tasks2.ts";
    import {Attributes} from "./src/attributes.ts";
    import {Terrain} from "./src/terrain.ts";
    import {Tasks3} from "./src/tasks3.ts";
    import {StartSceneScripting} from "./src/start-scene-scripting.ts";
    import {AddScript} from "./src/add-script.ts";
    import {Printing} from "./src/printing.ts";
    import {OutputWindow} from "./src/output-window.ts";
    import {ReferenceObjects} from "./src/reference-objects.ts";
    import {ChangeProperties} from "./src/change-properties.ts";
    import {DisappearingPlattform} from "./src/disappearing-plattform.ts";
    import {Events} from "./src/events.ts";
    import {DisappearingPlattformEvent} from "./src/disappearing-plattform-event.ts";
    import {PowerUps} from "./src/power-ups.ts";

    const sketchHolder = document.getElementById('sketch-holder');
    if (!sketchHolder) {
        throw new Error('Could not find sketch holder element');
    }
    initScenes(
        sketchHolder,
        [
            ["startScene", new StartScene()],

            // setup
            ["setupApple", new SetupWinAppleScene("apple")],
            ["setupWindows", new SetupWinAppleScene("windows")],
            ["setupLinux", new SetupLinux()],

            // getting started
            ["gettingStarted", new GettingStarted()],
            ["camera", new Camera()],
            ["placePart", new PlacePart()],
            ["runGame", new RunGame()],

            // movement
            ["movement", new Movement()],
            ["anker", new Anker()],
            ["tasks1", new Tasks1()],

            // attributes
            ["attributes", new Attributes()],
            ["tasks2", new Tasks2()],

            // terrain
            ["terrain1", new Terrain(1)],
            ["terrain2", new Terrain(2)],
            ["terrain3", new Terrain(3)],
            ["terrain4", new Terrain(4)],
            ["terrain5", new Terrain(5)],
            ["tasks3", new Tasks3()],

            // scripting
            ["startScripting", new StartSceneScripting()],

            // script
            ["addScript", new AddScript()],
            ["printing", new Printing()],
            ["outputWindow", new OutputWindow()],

            // reference objects
            ["referenceObjects", new ReferenceObjects()],
            ["changeProperties", new ChangeProperties()],
            ["disappearingPlattform", new DisappearingPlattform()],

            // events
            ["events", new Events()],
            ["disappearingPlattformEvents", new DisappearingPlattformEvent()],
            ["powerUps", new PowerUps()],
        ],
        [],
        [
            "back_button.png", "arrow.png", "movement.png", "worktime.png", "attributes.png", "terrain.png",
            "linux.png", "windows.png", "apple.png",
            "baseplate.png", "home.png", "menu.png", "terrainUi.png",
            "helloWorld.png", "properties.png", "events.png", "addScript.png", "printingExample.png",
            "outputWindow.png", "referenceObjectExample.png", "exampleChangeAttribute.png",
            "disappearingPartExample.png", "exampleEvent.png", "exampleDisappearingPlattform.png", "powerUp.png"
        ]
    );
</script>
</body>
</html>
